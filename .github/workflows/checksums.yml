name: checksums

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - 'bin/**'
      - 'files/**'
      - 'lib/**'
      - 'manifest.tsv'

jobs:
  macos-zsh-compatibility:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: parse the setup runtime with macOS system zsh
        run: |
          /bin/zsh -n install.sh
          /bin/zsh -n bin/setup
          /bin/zsh -n lib/script-helpers.sh
          awk -F '\t' '$3 == "script" { print $4 }' manifest.tsv | while read -r source; do
            /bin/zsh -n "$source"
          done

  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: syntax check shell scripts
        run: |
          zsh -n install.sh
          zsh -n bin/setup
          zsh -n lib/script-helpers.sh
          awk -F '\t' '$3 == "script" { print $4 }' manifest.tsv | while read -r source; do
            zsh -n "$source"
          done
          for f in bin/*; do
            [[ -f "$f" && "$f" != bin/setup ]] && bash -n "$f"
          done
      - name: syntax check python scripts
        run: |
          for f in files/refresh-models; do
            python3 -c "import py_compile; py_compile.compile('$f', doraise=True)"
          done
      - name: generate checksums
        run: scripts/checksums
      - name: commit if changed
        run: |
          if git diff --quiet checksums.tsv; then
            echo "no changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add checksums.tsv
            git commit -m "chore: refresh checksums.tsv [skip ci]"
            git push
          fi
